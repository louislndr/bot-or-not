<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
  </defs>

  <!-- App icon rounded square -->
  <rect width="400" height="400" rx="88" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="60"  cy="40"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="130" cy="25"  r="1"   fill="white" opacity="0.4"/>
  <circle cx="210" cy="50"  r="1.5" fill="white" opacity="0.5"/>
  <circle cx="290" cy="30"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="350" cy="55"  r="1.5" fill="white" opacity="0.4"/>
  <circle cx="40"  cy="90"  r="1"   fill="white" opacity="0.3"/>
  <circle cx="370" cy="100" r="1"   fill="white" opacity="0.5"/>
  <circle cx="85"  cy="340" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="320" cy="360" r="1"   fill="white" opacity="0.6"/>
  <circle cx="160" cy="375" r="1.5" fill="white" opacity="0.3"/>

  <!-- Space Invader (pixel art, centered, green) -->
  <!-- Grid: each pixel = 18x18, invader is ~11w x 8h = 198 x 144, centered at (200,185) -->
  <!-- Top antennae row -->
  <rect x="128" y="83"  width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="254" y="83"  width="18" height="18" rx="3" fill="#34c759"/>

  <!-- Row 1 -->
  <rect x="146" y="101" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="236" y="101" width="18" height="18" rx="3" fill="#34c759"/>

  <!-- Row 2 -->
  <rect x="128" y="119" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="146" y="119" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="164" y="119" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="182" y="119" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="200" y="119" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="218" y="119" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="236" y="119" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="254" y="119" width="18" height="18" rx="3" fill="#34c759"/>

  <!-- Row 3 -->
  <rect x="110" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="128" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="146" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="164" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="182" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="200" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="218" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="236" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="254" y="137" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="272" y="137" width="18" height="18" rx="3" fill="#34c759"/>

  <!-- Row 4 (eyes) -->
  <rect x="110" y="155" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="128" y="155" width="18" height="18" rx="3" fill="#34c759"/>
  <!-- left eye gap -->
  <rect x="164" y="155" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="182" y="155" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="200" y="155" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="218" y="155" width="18" height="18" rx="3" fill="#34c759"/>
  <!-- right eye gap -->
  <rect x="254" y="155" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="272" y="155" width="18" height="18" rx="3" fill="#34c759"/>

  <!-- Row 5 -->
  <rect x="110" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="128" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="146" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="164" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="182" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="200" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="218" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="236" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="254" y="173" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="272" y="173" width="18" height="18" rx="3" fill="#34c759"/>

  <!-- Row 6 (mouth/bottom body) -->
  <rect x="146" y="191" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="200" y="191" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="254" y="191" width="18" height="18" rx="3" fill="#34c759"/>

  <!-- Row 7 (feet) -->
  <rect x="128" y="209" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="146" y="209" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="236" y="209" width="18" height="18" rx="3" fill="#34c759"/>
  <rect x="254" y="209" width="18" height="18" rx="3" fill="#34c759"/>

  <!-- Crosshair / targeting reticle (red, locking on) -->
  <circle cx="200" cy="165" r="72" fill="none" stroke="#ff3b30" stroke-width="2" opacity="0.7" stroke-dasharray="12 6"/>
  <line x1="200" y1="80"  x2="200" y2="103" stroke="#ff3b30" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="227" x2="200" y2="250" stroke="#ff3b30" stroke-width="2" opacity="0.7"/>
  <line x1="115" y1="165" x2="138" y2="165" stroke="#ff3b30" stroke-width="2" opacity="0.7"/>
  <line x1="262" y1="165" x2="285" y2="165" stroke="#ff3b30" stroke-width="2" opacity="0.7"/>

  <!-- "BOT DETECTED" label -->
  <rect x="108" y="278" width="184" height="26" rx="6" fill="#ff3b30" opacity="0.15"/>
  <text x="200" y="296" text-anchor="middle"
        font-family="Inter, monospace" font-size="13" font-weight="700"
        letter-spacing="3" fill="#ff3b30" opacity="0.9">BOT DETECTED</text>

  <!-- Laser beam shooting up -->
  <rect x="197" y="258" width="6" height="16" rx="3" fill="#ff3b30" opacity="0.8"/>

</svg>
